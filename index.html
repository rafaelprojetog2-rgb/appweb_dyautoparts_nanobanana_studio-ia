<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <script>
        // Capturador de Erros Precoce (Anti-Tela-Branca)
        window.onerror = function (msg, url, line, col, error) {
            console.error('[Early Error]', msg, error);
            const app = document.getElementById('app');
            if (app && !window.initialized) {
                app.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: white; background: #181818; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif;">
                        <span style="font-size: 48px; margin-bottom: 20px;">⚠️</span>
                        <h2 style="margin-bottom: 10px;">Falha ao Iniciar App</h2>
                        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px; max-width: 300px;">${msg}</p>
                        <button onclick="location.reload()" style="background: #E30613; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;">RECARREGAR</button>
                    </div>
                `;
            }
        };
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>appweb_dyautoparts</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#E30613">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="appweb_dyautoparts">
    <link rel="icon" type="image/png" sizes="192x192" href="/imagens/icon-512-black.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/imagens/icon-512-black.png">
    <link rel="apple-touch-icon" href="/imagens/icon-512-black.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Fjalla+One&display=swap"
        rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- FALLBACK VISUAL (ANTI-TELA-BRANCA) -->
    <style>
        :root {
            --bg: #181818;
            --primary: #E30613;
            --surface: #242424;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: 'Roboto Mono', monospace;
            color: white;
            overflow-x: hidden;
        }

        #app {
            height: 100%;
            width: 100%;
            position: relative;
        }

        .splash-preloader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .splash-logo {
            width: 300px;
            height: auto;
            filter: none;
        }


        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Garantir que o app shell suma quando o JS assumir */
        #app.loaded .splash-preloader {
            display: none;
        }
    </style>

    <link rel="stylesheet" href="/src/index.css?v=1.1.6">
</head>

<body>
    <div id="app">
        <!-- APP SHELL / SPLASH NATIVO (IMUNE A ERROS DE JS) -->
        <div class="splash-preloader">
            <img src="/imagens/icon-512-black.png" class="splash-logo" alt="DY AutoParts"
                onerror="this.src='https://placehold.co/300?text=DY+AutoParts&bg=181818&font=roboto'">


            <div
                style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
        </div>
    </div>
    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <div id="toast">Mensagem aqui</div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/supabaseClient.js"></script>
    <script src="/dataClient.js"></script>
    <script src="/app.js?v=2.21.0"></script>
</body>

</html>
